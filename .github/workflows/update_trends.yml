name: Daily Trend Update

on:
  schedule:
    - cron: '0 18 * * *' # 매일 UTC 18:00 (한국 시간 새벽 3시)
  workflow_dispatch:      # 수동 실행 버튼

jobs:
  update-trends:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          cd pipeline
          python -m pip install --upgrade pip
          pip install requests curl_cffi beautifulsoup4 python-dotenv google-genai playwright
          playwright install chromium
          
      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          cd pipeline
          python update_trends.py
          
      - name: Push to Public Database Repository
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # 1. 대상(공개) 저장소를 /tmp/database 경로에 클론
          git clone https://${PAT_TOKEN}@github.com/KOO-BY/trend-database.git /tmp/database
          
          # 2. 업데이트된 파일 복사 (루트 경로의 JSON 파일 복사)
          cp trend_data.json /tmp/database/
          cp ingredients_master.json /tmp/database/
          
          # 3. 공개 저장소에 푸시
          cd /tmp/database
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trend_data.json ingredients_master.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update trend data [skip ci]"
            git push origin main
          fi
